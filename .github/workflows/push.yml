name: Run PHPStan & PhpUnit tests

on:
  push:
    branches:
      - master

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: wordpress
        ports:
          - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, cs2pr, wp-cli
          extensions: zip, simplexml

      - name: Setup WordPress
        run: |
          wp core download
          wp config create --dbname=wordpress --dbuser=root --dbpass=password --dbhost=127.0.0.1:${{ job.services.mysql.ports['3306'] }}
          wp core install --url="http://127.0.0.1:8080" --title="Test" --admin_user="admin" --admin_password="password" --admin_email="test@test.com" --skip-email
          # run the server
          php -S 127.0.0.1:8080 &
          sleep 5

      - name: Verify WordPress
        run: curl -f http://127.0.0.1

      - name: Update environment config for GitHub Actions
        env:
          PLUGIN_SLUG: ${{ github.event.repository.name }}
        run: |
          find . -depth \( -name '.env.testing' \) -exec sed -i "s/TEST_SITE_DB_HOST=\"127.0.0.1\"/TEST_SITE_DB_HOST=\"127.0.0.1:${{ job.services.mysql.ports['3306'] }}\"/g" {} +
          find . -depth \( -name '.env.testing' -o -name '*.cest' \) -exec sed -i "s/localhost:8080\/${{ env.PLUGIN_SLUG }}/localhost:8080/g" {} +
          find . -depth \( -name 'dump.sql' \) -exec sed -i "s/localhost:8080\/${{ env.PLUGIN_SLUG }}/localhost:8080/g" {} +

      - name: Read .env.testing
        uses: c-py/action-dotenv-to-setenv@v2
        with:
          env-file: .env.testing

      - name: Configure MySQL
        run: |
          mysql -h 127.0.0.1 --port ${{ job.services.mysql.ports['3306'] }} -u root -ppassword -e "CREATE USER '"$TEST_DB_USER"'@'%' IDENTIFIED WITH mysql_native_password BY '"$TEST_DB_PASSWORD"';";

      - name: Run composer install
        continue-on-error: true
        run: composer install  --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan to add annotations to the code
        continue-on-error: true
        run: vendor/bin/phpstan analyse -c phpstan.neon --memory-limit 1G --no-progress --error-format=checkstyle | cs2pr

      - name: Run PhpUnit
        run: vendor/bin/phpunit -c phpunit.xml.dist

      - name: Verify WordPress is running and REST API is accessible
        run: |
          # Use curl to check the default posts endpoint
          curl -f http://127.0.0.1:80/wp-json/wp/v2/posts 
          # The -f flag makes curl fail if the HTTP request is not successful (e.g., 404 or 500 errors)
